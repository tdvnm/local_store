services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: society_commerce
      POSTGRES_USER: sc_dev
      POSTGRES_PASSWORD: sc_dev_pass
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sc_dev -d society_commerce"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Default=Host=postgres;Database=society_commerce;Username=sc_dev;Password=sc_dev_pass
      - ConnectionStrings__Redis=redis:6379
      - Jwt__Secret=dev-secret-key-min-32-characters-long-here
      - Jwt__Issuer=societycommerce.in
      - Jwt__Audience=societycommerce.in
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src
    develop:
      watch:
        - action: rebuild
          path: ./src

volumes:
  pg_data:
